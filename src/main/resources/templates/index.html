<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 小说阅读网 - 海量小说免费阅读</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .rank-section { margin-bottom: 30px; }
        .rank-title {
            font-size: 22px; font-weight: bold; color: #333;
            margin-bottom: 15px; padding-left: 15px; border-left: 4px solid #f44336;
        }
        .rank-list { display: flex; gap: 15px; overflow-x: auto; }
        .rank-item {
            min-width: 160px; background: white; border-radius: 10px;
            padding: 15px; text-align: center; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: all 0.3s;
        }
        .rank-item:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        .rank-num { font-size: 28px; font-weight: bold; margin-bottom: 8px; }
        .rank-1 { color: #f44336; } .rank-2 { color: #ff9800; } .rank-3 { color: #ffc107; } .rank-other { color: #999; }
        .rank-name { font-size: 15px; font-weight: bold; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .rank-author { font-size: 12px; color: #999; margin-top: 4px; }
        .rank-clicks { font-size: 11px; color: #bbb; margin-top: 2px; }
        .video-section { margin-bottom: 25px; }
        .video-btn { padding: 8px 18px; border: none; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.3s; }
        .video-btn.active { color: white; }
        .video-btn.zx { background: #fff0f0; color: #f44336; }
        .video-btn.zx.active { background: #f44336; color: white; }
        .video-btn.qz { background: #fff8f0; color: #ff9800; }
        .video-btn.qz.active { background: #ff9800; color: white; }
        .video-btn.dp { background: #f0f0ff; color: #667eea; }
        .video-btn.dp.active { background: #667eea; color: white; }
    </style>
</head>
<body>
<div class="header">
    <div class="container">
        <div class="logo">📚 小说阅读网</div>
        <div class="nav">
            <a href="/">首页</a>
            <a href="#rankSection">排行榜</a>
            <a href="/login" id="loginLink">登录</a>
        </div>
    </div>
</div>

<div class="container">
    <!-- 搜索框 -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍  搜索小说名称或作者..." onkeypress="if(event.keyCode===13) searchNovel()">
        <button onclick="searchNovel()">搜索</button>
    </div>

    <!-- 视频推荐 -->
    <div class="video-section" id="videoSection">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
            <h2 style="font-size:22px;font-weight:bold;color:#333;padding-left:15px;border-left:4px solid #f44336;margin:0;">🎬 排行榜前三 · 精彩视频</h2>
            <button id="toggleVideoBtn" onclick="toggleVideo()" style="padding:6px 15px;background:#667eea;color:white;border:none;border-radius:20px;cursor:pointer;font-size:14px;">收起 ▲</button>
        </div>
        <div id="videoContainer" style="position:relative;width:100%;border-radius:12px;overflow:hidden;box-shadow:0 5px 20px rgba(0,0,0,0.2);transition:all 0.3s;">
            <iframe id="videoIframe" src="https://player.bilibili.com/player.html?bvid=BV1WLWZeHEAf&page=1&high_quality=1&autoplay=0"
                    style="width:100%;height:450px;border:none;" allowfullscreen></iframe>
            <div style="display:flex;gap:10px;padding:12px;background:#fafafa;flex-wrap:wrap;align-items:center;">
                <button class="video-btn zx active" id="btnZx" onclick="switchVideo('BV1WLWZeHEAf', 'zx')">🥇 诛仙</button>
                <button class="video-btn qz" id="btnQz" onclick="switchVideo('BV1GK4y1Y7tS', 'qz')">🥈 全职高手</button>
                <button class="video-btn dp" id="btnDp" onclick="switchVideo('BV1At8szKEEm', 'dp')">🥉 斗破苍穹</button>
                <span style="flex:1;"></span>
                <button onclick="resizeVideo('big')" style="padding:6px 15px;background:#ff9800;color:white;border:none;border-radius:20px;cursor:pointer;font-size:13px;">🔍 放大</button>
                <button onclick="resizeVideo('small')" style="padding:6px 15px;background:#ff9800;color:white;border:none;border-radius:20px;cursor:pointer;font-size:13px;">🔎 缩小</button>
            </div>
        </div>
    </div>

    <!-- 排行榜 -->
    <div class="rank-section" id="rankSection">
        <h2 class="rank-title">🏆 点击排行榜 TOP 8</h2>
        <div class="rank-list" id="rankList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <!-- 分类标签 -->
    <div class="category-tags" id="categoryTags">
        <div class="category-tag active" onclick="filterByCategory(null, this)">全部</div>
        <div class="category-tag" onclick="filterByCategory(1, this)">玄幻</div>
        <div class="category-tag" onclick="filterByCategory(2, this)">修真</div>
        <div class="category-tag" onclick="filterByCategory(3, this)">都市</div>
        <div class="category-tag" onclick="filterByCategory(5, this)">网游</div>
    </div>

    <!-- 小说列表 -->
    <h2 class="section-title">📖 全部小说</h2>
    <div class="novel-grid" id="novelList">
        <div class="loading">加载中...</div>
    </div>
    <div class="load-more" id="loadMore" style="display:none;">
        <button onclick="loadMore()">查看更多 ↓</button>
    </div>
</div>

<script src="/static/js/common.js"></script>
<script>
    let currentPage = 1;
    const pageSize = 20;
    let currentKeyword = '';
    let currentCategoryId = null;
    let videoHeight = 450;

    window.onload = function() {
        loadRankList();
        loadNovels();
        checkUserLogin();
    };

    function checkUserLogin() {
        fetch('/api/user/info')
            .then(res => res.json())
            .then(result => {
                if (result.code === 200 && result.data) {
                    document.getElementById('loginLink').textContent = result.data.nickname || result.data.username;
                    document.getElementById('loginLink').href = '/user/center';
                }
            }).catch(() => {});
    }

    // ========== 视频 ==========
    function switchVideo(bvid, type) {
        document.getElementById('videoIframe').src = 'https://player.bilibili.com/player.html?bvid=' + bvid + '&page=1&high_quality=1&autoplay=0';
        document.querySelectorAll('.video-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(type === 'zx' ? 'btnZx' : type === 'qz' ? 'btnQz' : 'btnDp').classList.add('active');
    }
    function resizeVideo(type) {
        videoHeight = type === 'big' ? Math.min(videoHeight + 100, 750) : Math.max(videoHeight - 100, 300);
        document.getElementById('videoIframe').style.height = videoHeight + 'px';
    }
    function toggleVideo() {
        const c = document.getElementById('videoContainer');
        const b = document.getElementById('toggleVideoBtn');
        if (c.style.display === 'none') { c.style.display = 'block'; b.textContent = '收起 ▲'; }
        else { c.style.display = 'none'; b.textContent = '展开 ▼'; }
    }

    // ========== 排行榜 ==========
    function loadRankList() {
        fetch('/api/novel/list?page=1&size=8&orderBy=click')
            .then(res => res.json())
            .then(result => { if (result.code === 200 && result.data) renderRankList(result.data.records); });
    }
    function renderRankList(novels) {
        const container = document.getElementById('rankList');
        if (!novels || novels.length === 0) { container.innerHTML = '<div style="padding:20px;color:#999;">暂无数据</div>'; return; }
        container.innerHTML = novels.map((novel, index) => {
            const rc = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : 'rank-other';
            return `<div class="rank-item" onclick="window.location.href='/novel/${novel.id}'">
                <div class="rank-num ${rc}">No.${index+1}</div>
                <div class="rank-name">${novel.title}</div>
                <div class="rank-author">${novel.author||'佚名'}</div>
                <div class="rank-clicks">${formatNumber(novel.clickCount||0)} 点击</div>
            </div>`;
        }).join('');
    }

    // ========== 小说列表 ==========
    function loadNovels() {
        let url = `/api/novel/list?page=${currentPage}&size=${pageSize}`;
        if (currentKeyword) url += `&keyword=${encodeURIComponent(currentKeyword)}`;
        if (currentCategoryId) url += `&categoryId=${currentCategoryId}`;
        fetch(url).then(res => res.json()).then(result => {
            if (result.code === 200 && result.data) {
                renderNovels(result.data.records);
                document.getElementById('loadMore').style.display = result.data.current < result.data.pages ? 'block' : 'none';
            } else { if (currentPage === 1) document.getElementById('novelList').innerHTML = '<div class="loading">暂无数据</div>'; }
        }).catch(() => { if (currentPage === 1) document.getElementById('novelList').innerHTML = '<div class="loading">加载失败</div>'; });
    }
    function renderNovels(novels) {
        const container = document.getElementById('novelList');
        if (currentPage === 1) container.innerHTML = '';
        if (!novels || novels.length === 0) { if (currentPage === 1) container.innerHTML = '<div class="loading">暂无数据</div>'; return; }
        novels.forEach(novel => {
            const card = document.createElement('div');
            card.className = 'novel-card';
            card.onclick = () => window.location.href = `/novel/${novel.id}`;
            const coverUrl = novel.coverUrl || '';
            const coverHtml = coverUrl
                ? `<img src="${coverUrl}" style="width:100%;height:100%;object-fit:cover;" onerror="this.onerror=null;this.parentElement.style.background=getRandomColor();this.parentElement.innerHTML='<span style=font-size:60px>${novel.title.charAt(0)}</span>'">`
                : `<span style="font-size:60px">${novel.title.charAt(0)}</span>`;
            card.innerHTML = `
                <div class="cover" style="background:${getRandomColor()};">${coverHtml}
                    <span class="status-badge ${novel.status===1?'status-completed':'status-ongoing'}">${novel.status===1?'已完结':'连载中'}</span>
                </div>
                <div class="info"><div class="title" title="${novel.title}">${novel.title}</div><div class="author">✍️ ${novel.author||'佚名'}</div></div>`;
            container.appendChild(card);
        });
    }
    function searchNovel() { currentKeyword = document.getElementById('searchInput').value.trim(); currentPage = 1; loadNovels(); }
    function filterByCategory(cid, el) { currentCategoryId = cid; currentPage = 1; document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active')); el.classList.add('active'); loadNovels(); }
    function loadMore() { currentPage++; loadNovels(); }
</script>
</body>
</html>
