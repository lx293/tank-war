<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 小说阅读网</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-box {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-login:hover {
            opacity: 0.9;
        }
        .login-tip {
            text-align: center;
            margin-top: 15px;
            color: #999;
            font-size: 14px;
        }
        .login-tip a {
            color: #667eea;
        }
        .error-msg {
            color: #f44336;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
        .success-msg {
            color: #4CAF50;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
<div class="header">
    <div class="container">
        <div class="logo">📚 <a href="/">小说阅读网</a></div>
        <div class="nav">
            <a href="/">首页</a>
        </div>
    </div>
</div>

<div class="login-box">
    <h2>用户注册</h2>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
    <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名">
    </div>
    <div class="form-group">
        <label>昵称</label>
        <input type="text" id="nickname" placeholder="请输入昵称">
    </div>
    <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码">
    </div>
    <button class="btn-login" onclick="register()">注 册</button>
    <div class="login-tip">
        已有账号？<a href="/login">立即登录</a>
    </div>
</div>

<script>
    function register() {
        const username = document.getElementById('username').value.trim();
        const nickname = document.getElementById('nickname').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            showError('用户名和密码不能为空');
            return;
        }

        fetch('/api/user/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, nickname, password })
        })
        .then(res => res.json())
        .then(result => {
            if (result.code === 200) {
                document.getElementById('successMsg').textContent = '注册成功！正在跳转...';
                document.getElementById('successMsg').style.display = 'block';
                setTimeout(() => window.location.href = '/login', 1500);
            } else {
                showError(result.message);
            }
        })
        .catch(() => showError('网络错误'));
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
    }
</script>
</body>
</html>
